services:
  - type: web
    name: CreviaTube-api
    runtime: node
    plan: starter
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: CreviaTube-db
          property: connectionString

databases:
  - name: CreviaTube-db
    databaseName: CreviaTube
    plan: starter